; Runs the FastAPI API and the Streamlit UI side by side in the single
; Hugging Face Spaces container. Logs go to stdout/stderr so they show
; up in the Space's log viewer.

[supervisord]
nodaemon=true
user=app
logfile=/dev/stdout
logfile_maxbytes=0

[program:api]
command=uvicorn price_predictor.serving.asgi:get_app --factory --host 127.0.0.1 --port 8000
autostart=true
autorestart=true
startsecs=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:ui]
command=streamlit run src/price_predictor/ui/streamlit_app.py --server.port 7860 --server.address 0.0.0.0 --server.headless true
autostart=true
autorestart=true
startsecs=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
