# Mirrors what Hugging Face Spaces builds: the single supervisord image.
# Use this to reproduce the public demo locally:
#   docker compose -f docker-compose.spaces.yml up --build
name: price-predictor-spaces

services:
  app:
    build:
      context: .
      dockerfile: docker/spaces.Dockerfile
    environment:
      PP_ENV: prod
      # ADR 0011: model is pulled from a REMOTE MLflow registry at
      # startup. Point this at your tracking server; if left at the
      # sqlite default the demo serves /predict -> 503 (no model).
      PP_MLFLOW__TRACKING_URI: ${PP_MLFLOW__TRACKING_URI:-sqlite:///mlflow.db}
      PP_MLFLOW__REGISTRY_URI: ${PP_MLFLOW__REGISTRY_URI:-}
      PP_API__MODEL_NAME: ${PP_API__MODEL_NAME:-price-predictor}
      PP_API__MODEL_STAGE: ${PP_API__MODEL_STAGE:-production}
    ports:
      - "7860:7860"
