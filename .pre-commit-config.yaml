minimum_pre_commit_version: "4.0.0"
default_install_hook_types: [pre-commit]
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: debug-statements

  # Lint + format with the *project-pinned* ruff/mypy so pre-commit can never
  # drift from `uv run ruff` / `uv run mypy` used in CI and the Makefile.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy (strict, src)
        entry: uv run mypy src
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
