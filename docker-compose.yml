# Full local stack. The HF Spaces demo only ships api+ui in one image
# (docker-compose.spaces.yml); Postgres/MLflow/Prometheus/Grafana are
# local-only - see README "Deployment trade-offs" and ADR 0004.
name: price-predictor

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: price_predictor
      POSTGRES_PASSWORD: ${PP_POSTGRES__PASSWORD:-change-me}
      POSTGRES_DB: price_predictor
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U price_predictor"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.0
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri postgresql://price_predictor:${PP_POSTGRES__PASSWORD:-change-me}@postgres:5432/price_predictor
      --artifacts-destination /mlruns
    volumes:
      - mlruns:/mlruns
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      PP_ENV: local
      PP_POSTGRES__HOST: postgres
      PP_POSTGRES__PASSWORD: ${PP_POSTGRES__PASSWORD:-change-me}
      PP_MLFLOW__TRACKING_URI: http://mlflow:5000
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    ports:
      - "8000:8000"

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    environment:
      PP_API__HOST: api
    depends_on:
      api:
        condition: service_started
    ports:
      - "7860:7860"

  prometheus:
    image: prom/prometheus:v3.0.0
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      api:
        condition: service_started
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  pgdata:
  mlruns:
  grafana:
