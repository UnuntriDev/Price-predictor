# Full local stack. The HF Spaces demo only ships api+ui in one image
# (docker-compose.spaces.yml); Postgres/MLflow/Prometheus/Grafana are
# local-only - see README "Deployment trade-offs" and ADR 0004.
name: price-predictor

services:
  # S3-compatible object store; the DVC remote for data/model artifacts
  # (ADR 0009). Same API as AWS S3 - only the endpoint differs in prod.
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "9000:9000"
      - "9001:9001"

  # One-shot: create the DVC bucket, then exit.
  minio-setup:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000
      ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/price-predictor &&
      echo 'bucket price-predictor ready'"
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: price_predictor
      POSTGRES_PASSWORD: ${PP_POSTGRES__PASSWORD:-change-me}
      POSTGRES_DB: price_predictor
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U price_predictor"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow.Dockerfile
    image: price-predictor-mlflow
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --allowed-hosts localhost,localhost:5000,127.0.0.1,127.0.0.1:5000,mlflow,mlflow:5000
      --backend-store-uri postgresql://price_predictor:${PP_POSTGRES__PASSWORD:-change-me}@postgres:5432/price_predictor
      --artifacts-destination /mlruns
    volumes:
      - mlruns:/mlruns
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      PP_ENV: local
      PP_POSTGRES__HOST: postgres
      PP_POSTGRES__PASSWORD: ${PP_POSTGRES__PASSWORD:-change-me}
      PP_MLFLOW__TRACKING_URI: http://mlflow:5000
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    ports:
      - "8000:8000"

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    environment:
      PP_API__HOST: api
    depends_on:
      api:
        condition: service_started
    ports:
      - "7860:7860"

  prometheus:
    image: prom/prometheus:v3.0.0
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      api:
        condition: service_started
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "3000:3000"

  # On-demand drift job: `docker compose --profile tools run --rm evidently`.
  # Reuses the API image (package + configs baked in) and writes the
  # HTML report to ./artifacts on the host.
  evidently:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command:
      ["python", "-m", "price_predictor.monitoring.job"]
    environment:
      PP_ENV: local
      PP_POSTGRES__HOST: postgres
      PP_POSTGRES__PASSWORD: ${PP_POSTGRES__PASSWORD:-change-me}
      PP_ARTIFACTS_DIR: /app/artifacts
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  mlruns:
  grafana:
  miniodata:
